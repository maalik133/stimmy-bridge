<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stimulus Assistance</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #070707;
      color: #fff;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 390px;
      padding: 12px;
    }

    .card {
      background: #000;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .proof {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .proof-box {
      background: #161616;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 11px;
    }

    .green { color: #33d17a; }

    h1 {
      text-align: center;
      font-size: 28px;
      margin: 0;
    }

    .sub {
      text-align: center;
      font-size: 13px;
      color: #ccc;
      margin: 10px 0;
    }

    .pill {
      background: #f3deb1;
      color: #5d4a18;
      padding: 8px;
      border-radius: 10px;
      text-align: center;
      font-size: 12px;
      margin: 10px 0;
    }

    .reviews {
      background: #161616;
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
    }

    .review {
      margin-bottom: 12px;
      font-size: 14px;
    }

    .cta {
      display: block;
      margin-top: 14px;
      text-align: center;
      background: #f2f2f2;
      color: #000;
      padding: 14px;
      border-radius: 10px;
      font-weight: bold;
      text-decoration: none;
    }

    .next {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <div class="proof">
        <div class="proof-box" id="proofBox"></div>
      </div>

      <h1>
        Bills Were Adding Up Fast...<br>
        So I Checked My <span class="green">Stimulus Eligibility</span>
      </h1>

      <div class="sub">
        Takes less than a minute to check your eligibility
      </div>

      <div class="pill">
        ⚠ Limited-time review: Eligibility may change — check your status now
      </div>

      <div class="reviews">
        <div style="font-weight:bold;">★ What People Are Saying</div>
        <div id="reviews"></div>
      </div>

      <div class="next">
        Enter your details to check eligibility
      </div>

      <a href="https://trksy.org/aff_c?offer_id=1421&aff_id=170653" class="cta">
        Check My Eligibility →
      </a>

    </div>
  </div>

  <script>
    const proofs = [
      "Samantha J. • Phoenix, AZ",
      "Tyler M. • Orlando, FL",
      "Jordan L. • Dallas, TX",
      "Ashley B. • Houston, TX",
      "Marcus H. • San Antonio, TX"
    ];

    const reviews = [
      "I thought this was just another TikTok thing honestly, but I checked anyway because my bills have been stacking up lately.",
      "A friend sent this to me and told me to at least look into it, so I finally did instead of ignoring it again.",
      "I didn’t think I’d qualify for anything at all, so I was honestly surprised just seeing what was available.",
      "Between rent and groceries going up, I figured it wouldn’t hurt to check instead of guessing.",
      "I almost skipped it completely but decided to check anyway just to see if anything applied to me.",
      "I’ve been trying to stay ahead of bills lately and this was one of the few things that actually felt worth checking.",
      "I saw people talking about this and thought it sounded fake at first, but I still checked just in case.",
      "Money has been tighter than usual lately so I figured I should at least see what I qualify for."
    ];

    let pIndex = 0;
    let rIndex = 0;

    function updateProof() {
      document.getElementById("proofBox").innerHTML =
        proofs[pIndex] + "<br><span class='green'>Was approved for stimulus assistance</span>";
      pIndex = (pIndex + 1) % proofs.length;
    }

    function updateReviews() {
      let html = "";
      for (let i = 0; i < 3; i++) {
        html += `<div class="review">${reviews[(rIndex + i) % reviews.length]}</div>`;
      }
      document.getElementById("reviews").innerHTML = html;
      rIndex = (rIndex + 1) % reviews.length;
    }

    updateProof();
    updateReviews();

    setInterval(updateProof, 2500);
    setInterval(updateReviews, 4000);
  </script>
</body>
</html>
